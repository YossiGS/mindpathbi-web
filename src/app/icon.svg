<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!--
    MindPath BI — browser tab favicon.

    Mirrors <BrandMark> from the app but optimized for 16/32px rendering:
    rounded dark stamp, letter `M` drawn as a path (so no web-font is needed),
    whisper arc travelling from the M's upper-right shoulder to an accent-blue
    destination dot in the top-right quadrant. Same "path → answer" metaphor
    the product is built on.
  -->
  <rect width="32" height="32" rx="6" ry="6" fill="#0B0F17"/>

  <!-- M monogram, path-drawn (no font dependency) -->
  <path
    d="M 8 22 L 8 10 L 14.5 17 L 21 10 L 21 22"
    fill="none"
    stroke="#F5F5F7"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Path arc: emerges from the M's upper-right shoulder -->
  <path
    d="M 21 10 Q 23.5 10 25 7"
    fill="none"
    stroke="#3B82F6"
    stroke-opacity="0.6"
    stroke-width="1.4"
    stroke-linecap="round"
  />

  <!-- Destination dot (the "answer" the path arrives at) -->
  <circle cx="25.5" cy="5.5" r="2.4" fill="#3B82F6"/>
</svg>
